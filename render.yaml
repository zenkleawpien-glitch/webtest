services:
  - type: web
    name: firegame-shop
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24.17.0
      - key: DATA_DIR
        value: /var/data
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: firegame-data
      mountPath: /var/data
      sizeGB: 1